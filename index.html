<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tux 3D model</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 10px;
            color: #00adb5;
        }

        /* Contenedor del visor 3D */
        .visor-container {
            width: 80%;
            max-width: 800px;
            height: 500px;
            background-color: #2a2a35;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            margin-bottom: 25px;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #23232e;
        }

        /* Zona de botones de descarga */
        .download-zone {
            display: flex;
            gap: 20px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s, transform 0.2s;
            cursor: pointer;
        }

        .btn-glb {
            background-color: #00adb5;
            color: #eee;
        }

        .btn-glb:hover {
            background-color: #00c2cb;
            transform: translateY(-2px);
        }

        .btn-blend {
            background-color: #f57c00;
            color: #fff;
        }

        .btn-blend:hover {
            background-color: #ff9100;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <h1>Tux 3D model</h1>

    <div class="visor-container">
        <model-viewer 
            src="tux.glb" 
            ar 
            auto-rotate 
            camera-controls 
            shadow-intensity="1"
            alt="Modelo 3D de Tux">
        </model-viewer>
    </div>

    <div class="download-zone">
        <a href="tux.glb" download="tux.glb" class="btn btn-glb">Donwload tux.glb</a>
        <a href="tux.blend" download="tux.blend" class="btn btn-blend">Download tux.blend</a>
    </div>

</body>
</html>
